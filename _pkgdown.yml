url: https://jessebrandtdata.github.io/networkformat/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, articles, reference]
    right: [search, github]
  components:
    intro:
      text: Get Started
      href: articles/networkformat.html
    articles:
      text: Articles
      menu:
      - text: Edgelists and Nodelists
        href: articles/edgelist-nodelist.html
      - text: Visualization with ggraph
        href: articles/visualization.html
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fa-github
      href: https://github.com/jessebrandtdata/networkformat
      aria-label: GitHub

reference:
- title: Core generics
  desc: >
    The main generic functions exported by networkformat.
  contents:
  - "`networkformat-package`"
  - edgelist
  - nodelist
  - as.igraph
  - as_tbl_graph

- title: Vector and data frame methods
  desc: >
    Methods for atomic vectors (sequential edges) and data frames
    (column-pair edges with tidyselect).
  contents:
  - edgelist.default
  - nodelist.default
  - edgelist.data.frame
  - nodelist.data.frame

- title: List methods
  desc: >
    Methods for lists and S3 objects (recursive parent-child decomposition).
  contents:
  - edgelist.list
  - nodelist.list

- title: Tree model methods
  desc: >
    Methods for tree-based machine learning models.
  contents:
  - edgelist.tree
  - nodelist.tree
  - edgelist.rpart
  - nodelist.rpart
  - edgelist.randomForest
  - nodelist.randomForest
  - edgelist.xgb.Booster
  - nodelist.xgb.Booster
  - edgelist.gbm
  - nodelist.gbm

- title: Data
  desc: Example datasets included with the package.
  contents:
  - courses

articles:
- title: Vignettes
  navbar: ~
  contents:
  - networkformat
  - "`edgelist-nodelist`"
  - visualization
- title: Articles
  contents:
  - "`articles/complete-method-reference`"
  - "`articles/visual-qa`"

home:
  sidebar:
    structure: [links, license, dev]
